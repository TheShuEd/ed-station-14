- type: entity
  parent: BaseAction
  id: ActionRepulse
  name: Repulse
  description: Pushes entities away from the user.
  components:
  - type: RepulseAttract
    speed: 10
    range: 5
    whitelist:
      components:
      - MobMover
      - Item
  - type: Action
    useDelay: 40
    raiseOnAction: true
    itemIconStyle: BigAction
  - type: Sprite
    sprite: Objects/Magic/magicactions.rsi
    layers:
    - state: repulse
  - type: InstantAction
    event: !type:RepulseAttractActionEvent

  name: Turn Undead
  description: Succumb to your infection and become a zombie.
  components:
  - type: Action
  - type: Sprite
    layers:
    - texture: Interface/Actions/zombie-turn.png
  - type: InstantAction
    event: !type:ZombifySelfActionEvent

- type: entity

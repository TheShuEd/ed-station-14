- type: entity
  abstract: true
  parent: Clothing
  id: ClothingMaskBase
  components:
  - type: Sprite
    state: icon
  - type: Item
    size: Small
  - type: Clothing
    slots: [mask]
  - type: StaticPrice
    price: 25

- type: entity
  abstract: true
  parent: ClothingMaskBase
  id: ClothingMaskPullableBase
  components:
  - type: Mask

- type: entity
  parent: BaseAction
  id: ActionToggleMask
  name: Toggle Mask
  description: Handy, but prevents insertion of pie into your pie hole.
  components:
  - type: Action
  - type: Sprite
    sprite: Clothing/Mask/gas.rsi
    layers:
    - state: icon
      map: ["enum.ActionVisuals.Icon"]
    - texture: Interface/Default/blocked.png
      map: ["enum.ActionVisuals.IconToggled"]
      visible: false
  - type: InstantAction
    event: !type:ToggleMaskEvent

- type: entity
  abstract: true
  parent: [SolutionFood, SolutionToolSmall, ClothingMaskBase, BaseSlicingRefinable]
  id: ClothingMaskBaseButcherable
  components:
  - type: ToolRefinable
    refineResult:
    - id: MaterialCloth1
      amount: 1
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 50
  - type: Edible
    requiresSpecialDigestion: true
  - type: Solution
    solution:
      reagents:
      - ReagentId: Fiber
        Quantity: 15
  - type: Tag
    tags:
    - ClothMade
    - Recyclable

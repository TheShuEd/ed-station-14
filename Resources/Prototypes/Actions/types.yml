# base actions

# base prototype for all action entities
- type: entity
  abstract: true
  id: BaseAction
  components:
  - type: Action
  - type: Sprite
    layers:
    - map: ["enum.ActionVisuals.Icon"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ActionState.Toggled:
        enum.ActionVisuals.Icon:
          True: { visible: false }
          False: { visible: true }
        enum.ActionVisuals.IconToggled:
          True: { visible: true }
          False: { visible: false }
      enum.LimitedChargesState.HasCharges:
        enum.ActionVisuals.Icon:
          True: { color: White }
          False: { color: DimGray }
        enum.ActionVisuals.IconToggled:
          True: { color: White }
          False: { color: DimGray }

# base proto for an action that requires a DoAfter
- type: entity
  abstract: true
  parent: BaseAction
  id: BaseDoAfterAction
  components:
  - type: DoAfterArgs

# an action that is done all in le head and cant be prevented by any means
- type: entity
  abstract: true
  parent: BaseAction
  id: BaseMentalAction
  components:
  - type: Action
    checkCanInteract: false
    checkConsciousness: false

- type: entity
  abstract: true
  parent: BaseMentalAction
  id: BaseSuicideAction
  components:
  - type: ConfirmableAction
    popup: suicide-action-popup

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseImplantAction
  components:
  - type: InstantAction
    event: !type:ActivateImplantEvent

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseToggleAction
  components:
  - type: InstantAction
    event: !type:ToggleActionEvent

# actions

- type: entity
  parent: BaseAction
  id: ActionScream
  name: Scream
  description: AAAAAAAAAAAAAAAAAAAAAAAAA
  components:
  - type: Action
    useDelay: 10
    checkCanInteract: false
  - type: Sprite
    layers:
    - texture: Interface/Actions/scream.png
  - type: InstantAction
    event: !type:EmoteActionEvent
      emote: Scream

- type: entity
  parent: BaseMentalAction
